[build]
  command = "npm run build:netlify"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--no-fund --no-audit"

[context.production.environment]
  NODE_ENV = "production"
  HEALTHCHECK_WITH_DB = "false"

[context.deploy-preview.environment]
  NODE_ENV = "production"
  HEALTHCHECK_WITH_DB = "false"

[context.branch-deploy.environment]
  NODE_ENV = "production"
  HEALTHCHECK_WITH_DB = "false"
